<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Theme Calculator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        transition: 0.3s;
    }

    .container {
        text-align: center;
    }

    .theme-selector {
        margin-bottom: 15px;
        padding: 8px;
        border-radius: 5px;
    }

    .calculator {
        width: 320px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        text-align: right;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 18px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    /* Light Theme */
    .light {
        background: #f5f5f5;
        color: #222;
    }

    .light .calculator {
        background: white;
    }

    .light button {
        background: #e0e0e0;
    }

    /* Dark Theme */
    .dark {
        background: #121212;
        color: white;
    }

    .dark .calculator {
        background: #1f1f1f;
    }

    .dark button {
        background: #333;
        color: white;
    }

    .dark #display {
        background: #2b2b2b;
        color: white;
    }

    /* Neon Theme */
    .neon {
        background: #000;
        color: #0ff;
    }

    .neon .calculator {
        background: #111;
        box-shadow: 0 0 20px #0ff;
    }

    .neon button {
        background: #222;
        color: #0ff;
        box-shadow: 0 0 8px #0ff;
    }

    .neon #display {
        background: #000;
        color: #0ff;
        border: 1px solid #0ff;
    }

    .equal {
        background: orange !important;
        color: white !important;
    }
</style>
</head>
<body class="light">

<div class="container">
    <select class="theme-selector" onchange="changeTheme(this.value)">
        <option value="light">Light Theme</option>
        <option value="dark">Dark Theme</option>
        <option value="neon">Neon Theme</option>
    </select>

    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')">/</button>
            <button onclick="appendValue('*')">*</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('.')">.</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>

            <button style="grid-column: span 2;" onclick="appendValue('0')">0</button>
            <button style="grid-column: span 2;" onclick="backspace()">⌫</button>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    function changeTheme(theme) {
        document.body.className = theme;
    }
</script>

</body>
</html>
